[project]
name = "agent-memory-sdk"
version = "0.1.0"
description = "Python client library for Agent Memory System — dual-mode HttpTransport or EmbeddedTransport."
authors = [
    {name = "Developer"}
]
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"

dependencies = [
    "httpx (>=0.27,<1.0)",
    "pydantic (>=2.0,<3.0)",
]

[project.optional-dependencies]
embedded = ["agent-memory-core"]
langchain = ["langchain (>=0.3,<1.0)"]
all = [
    "agent-memory-sdk[embedded,langchain]",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_memory"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 120
