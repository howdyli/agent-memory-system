[project]
name = "agent-memory-server"
version = "0.1.0"
description = "FastAPI HTTP thin wrapper over agent-memory-core — auth, RBAC, multi-tenant, monitoring, EventBus."
authors = [
    {name = "Developer"}
]
requires-python = ">=3.11"
license = "MIT"
readme = "README.md"

dependencies = [
    "agent-memory-core",
    "fastapi (>=0.100,<1.0)",
    "uvicorn (>=0.30,<1.0)",
    "pyjwt (>=2.8,<3.0)",
    "python-jose (>=3.5,<4.0)",
    "passlib (>=1.7,<2.0)",
    "bcrypt (>=4.0,<5.0)",
    "cryptography (>=43.0,<50.0)",
    "alembic (>=1.13,<2.0)",
    "prometheus-client (>=0.20,<1.0)",
    "structlog (>=24.0,<25.0)",
    "httpx (>=0.27,<1.0)",
]

[project.optional-dependencies]
otel = [
    "opentelemetry-api (>=1.20,<2.0)",
    "opentelemetry-sdk (>=1.20,<2.0)",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent_memory_server"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py311"
line-length = 120
