version: "3.8"

services:
  # Redis - 记忆变量存储
  redis:
    image: redis:7.2-alpine
    container_name: agent-memory-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass password
    environment:
      - REDIS_PASSWORD=password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agent-memory-network

  # PostgreSQL - 记忆表存储
  postgres:
    image: postgres:16-alpine
    container_name: agent-memory-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agent_memory
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agent-memory-network

  # etcd - Milvus 依赖（元数据管理）
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: agent-memory-etcd
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-memory-network

  # MinIO - Milvus 依赖（对象存储）
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: agent-memory-minio
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent-memory-network

  # Milvus - 向量数据库
  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: agent-memory-milvus
    restart: always
    command: ["milvus", "run", "standalone"]
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    ports:
      - "19530:19530"  # gRPC
      - "9091:9091"    # HTTP
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - agent-memory-network

networks:
  agent-memory-network:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
  etcd_data:
  minio_data:
  milvus_data:
