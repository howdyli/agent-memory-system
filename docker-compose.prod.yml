# Agent Memory System - Docker Compose (Production)
# For production with PostgreSQL, Redis, and ChromaDB

version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://memory_user:${DB_PASSWORD}@postgres:5432/agent_memory
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_DB_PATH=/data/chromadb
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_EXPIRATION_HOURS=24
      - DEBUG=false
      - LOG_LEVEL=INFO
      - ENABLE_TRACING=true
      - OTLP_ENDPOINT=http://otel-collector:4317
    volumes:
      - memory_data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: agent-memory-postgres
    environment:
      - POSTGRES_DB=agent_memory
      - POSTGRES_USER=memory_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_user -d agent_memory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: agent-memory-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ChromaDB (Vector Database)
  chromadb:
    image: chromadb/chroma:latest
    container_name: agent-memory-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

  # ── Observability Stack ──

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: agent-memory-otel-collector
    volumes:
      - ../deploy/otel-collector.yaml:/etc/otelcol/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "13133:13133" # Health check
    depends_on:
      - jaeger
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: agent-memory-jaeger
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # gRPC ingest
    environment:
      - COLLECTOR_OTLP_ENABLED=false
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: agent-memory-prometheus
    volumes:
      - ../deploy/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: agent-memory-grafana
    volumes:
      - ../deploy/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-memory-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - full

volumes:
  memory_data:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: agent-memory-network
