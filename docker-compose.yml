version: '3.8'

services:
  # Redis - 记忆变量存储
  redis:
    image: redis:7.2-alpine
    container_name: agent-memory-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - agent-memory-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-memory-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///data/agent_memory.db
      - REDIS_URL=redis://redis:6379/0
      - CHROMA_PERSIST_DIR=/data/chromadb
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-key-change-in-production}
      - JWT_EXPIRATION_HOURS=24
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - memory_data:/data
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend (optional)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-memory-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - full

volumes:
  memory_data:
  redis_data:
    driver: local

networks:
  agent-memory-network:
    driver: bridge
