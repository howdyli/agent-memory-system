name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_install.txt || true
          pip install . || pip install -e . || true
          pip install pytest pytest-cov pytest-asyncio pytest-timeout ruff mypy

      - name: Lint (ruff)
        working-directory: backend
        run: ruff check app/ --select E,F --ignore E501

      - name: Type check (mypy)
        working-directory: backend
        run: mypy app/ --ignore-missing-imports --no-strict-optional || true

      - name: Test (pytest)
        working-directory: backend
        env:
          REDIS_URL: "fakeredis://"
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          working-directory: backend
          files: ./coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint (oxlint)
        working-directory: frontend
        run: npm run lint

      - name: Type check (tsc)
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Test (vitest)
        working-directory: frontend
        run: npm test
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Core Layer ──────────────────────────────────────────────
  core-lint-test:
    name: Core — Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    defaults:
      run:
        working-directory: packages/core
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]" ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test
        run: pytest -v --tb=short

  # ── Server Layer ────────────────────────────────────────────
  server-lint-test:
    name: Server — Lint & Test
    runs-on: ubuntu-latest
    needs: core-lint-test
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: packages/server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[otel]" ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test
        run: pytest -v --tb=short

  # ── Python SDK ──────────────────────────────────────────────
  sdk-python-lint-test:
    name: Python SDK — Lint & Test
    runs-on: ubuntu-latest
    needs: core-lint-test
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    defaults:
      run:
        working-directory: packages/sdk-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "." ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test
        run: pytest -v --tb=short

  # ── TypeScript SDK ──────────────────────────────────────────
  sdk-typescript-lint-test:
    name: TypeScript SDK — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-typescript
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/sdk-typescript/package.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (oxlint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
